<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Кидати помідорами в Тищенка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui" class="hidden">
    <div class="score">Влучань: <span id="score">0</span></div>
    <div class="hint">Клікни або торкнись — кинути помідор</div>
  </div>

  <canvas id="game"></canvas>

  <div id="start-menu">
    <div class="panel start-panel">
      <h1>Кидати помідорами в Тищенка</h1>
      <p class="start-tagline">Велюр, офісники і один дуже меткий незнайомець.</p>
      <p class="start-rules">Кидай помідори в Тищенка. Не дай ворогам дійти до тебе.</p>
      <button id="start" type="button">Старт</button>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <div class="panel">
      <img id="gameover-face" class="gameover-face" src="assets/face-gameover.png" alt="">
      <h1 id="overlay-title">Програш</h1>
      <p id="overlay-text">Офісник дійшов до гравця!</p>
      <p class="final-score">Влучань: <span id="final-score">0</span></p>
      <button id="restart">Грати знову</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
